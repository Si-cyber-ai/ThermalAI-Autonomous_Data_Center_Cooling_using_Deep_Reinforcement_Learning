# Data Center Cooling Optimization Configuration

# Simulation Parameters
simulation:
  grid_size: [3, 4]  # Rows x Columns of server racks
  timestep: 60  # seconds per simulation step
  max_steps: 500
  ambient_temperature: 25.0  # Celsius
  
  # Thermal dynamics coefficients
  alpha: 0.12  # heat generation coefficient
  beta: 0.30  # cooling efficiency
  gamma: 0.05  # heat diffusion from neighbors
  delta: 0.02  # ambient temperature effect
  noise_std: 0.1  # temperature noise standard deviation

# Safety Constraints
safety:
  max_temperature: 80.0  # Celsius
  min_temperature: 15.0  # Celsius
  critical_temperature: 85.0  # Emergency shutdown threshold
  max_cooling_change: 0.3  # Maximum cooling change per step
  temperature_warning: 75.0  # Warning threshold
  cooling_floor_temp: 70.0  # If avg temp > this, enforce min cooling
  cooling_floor_level: 0.2  # Minimum cooling level when floor active

# Reinforcement Learning
rl:
  state_dim: null  # Auto-calculated based on grid
  action_dim: 5  # Number of discrete cooling actions
  hidden_dim: 256
  learning_rate: 0.0003
  gamma: 0.99  # Discount factor
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay: 0.995
  batch_size: 64
  memory_size: 100000
  target_update_freq: 10
  training_episodes: 800
  entropy_weight: 0.01  # Action entropy encouragement
  
# PID Controller
pid:
  kp: 0.5
  ki: 0.1
  kd: 0.05
  setpoint: 65.0  # Target temperature in Celsius

# Reward Function Weights
reward:
  energy_weight: 1.0
  temperature_excess_weight: 10.0
  safety_violation_weight: 50.0
  cooling_instability_weight: 0.5
  comfort_zone_temp: 65.0  # Optimal operating temperature

# Workload Configuration
workload:
  type: "synthetic"  # "synthetic" or "trace"
  synthetic_pattern: "mixed"  # "sinusoidal", "spikes", "burst", "mixed"
  base_load: 0.3
  peak_load: 0.9
  trace_file: null  # Path to workload trace CSV

# Evaluation
evaluation:
  episodes: 100
  metrics: ["energy", "temperature_violations", "stability", "responsiveness"]

# Visualization
visualization:
  update_interval: 1  # Dashboard update frequency (steps)
  colormap: "hot"
  save_plots: true
  plot_dir: "plots"

# Model Checkpoints
checkpoints:
  save_dir: "checkpoints"
  save_frequency: 100  # Save every N episodes
  keep_last: 5  # Keep last N checkpoints
